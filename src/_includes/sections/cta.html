<section id="cta-697">
    <div class="cs-container">
        <div class="cs-content">
            <h2 class="cs-title">Book Your Healing Session!</h2>
            <a href="/booking/" class="cs-button-solid">Book Now</a>
        </div>
    </div>
    <!--SVG Waves Background-->
    <picture class="cs-background">
        <!--Mobile Image-->
        <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | avif %}" type="image/avif">
        <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | webp %}" type="image/webp">
        <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | jpeg %}" type="image/jpeg">
        <!--Tablet Image-->
        <source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | avif %}" type="image/avif">
        <source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | webp %}" type="image/webp">
        <source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | jpeg %}" type="image/jpeg">
        <!--Desktop Image-->
        <source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | avif %}" type="image/avif">
        <source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | webp %}" type="image/webp">
        <source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | jpeg %}" type="image/jpeg">
        <img src="{% getUrl "/assets/images/jpg/cta.jpg" | resize({ width: 1920, height: 318}) | jpeg %}" alt="library" width="1920" height="318" loading="lazy" decoding="async">
    </picture>
</section>
